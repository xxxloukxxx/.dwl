do tmux trash-cli universal-ctags vim vim-gtk3 vlc wayland-protocols wget wlr-randr wmenu x11-utils xfonts-100dpi xfonts-75dpi xfonts-base xfonts-encodings xfonts-scalable xfonts-utils xwayland zathura zsh zsh-autosuggestions zsh-syntax-highlighting
popularity-contest popularity-contest/participate boolean false
tasksel tasksel/first multiselect ssh-server, standard

# === Timezone ===
d-i time/zone string Europe/Paris

# === Disk partitioning (NO CONFIRM) ===
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# === GRUB ===
d-i grub-installer/only_debian boolean true

# === Finish ===
d-i finish-install/reboot_in_progress note

# === Post-install commands ===
d-i preseed/late_command string \
    in-target sed -i 's/^GRUB_TIMEOUT=.*/GRUB_TIMEOUT=2/' /etc/default/grub ; \
    in-target sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT=\"quiet splash\"/' /etc/default/grub ; \
    in-target update-grub
